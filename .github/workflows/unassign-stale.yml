name: Unassign Stale Issues
on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch: # Allow manual triggering for testing

permissions:
  issues: write

jobs:
  unassign-stale:
    runs-on: ubuntu-latest
    steps:
      - name: Check and Unassign Stale Assignments
        uses: actions/github-script@v7
        with:
          script: |
            // 5 days in milliseconds
            const STALE_DURATION = 5 * 24 * 60 * 60 * 1000;
            const now = new Date();
            
            // Get all open issues
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            
            for (const issue of issues) {
              // Skip Pull Requests and issues without assignees
              if (issue.pull_request || !issue.assignees || issue.assignees.length === 0) continue;
              
              // Fetch events for this issue to determine when it was last assigned
              const { data: events } = await github.rest.issues.listEvents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                per_page: 100
              });
              
              // Filter to get assignment events and sort descending by date
              const assignEvents = events
                .filter(e => e.event === 'assigned')
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              
              if (assignEvents.length > 0) {
                const latestAssignEvent = assignEvents[0];
                const assignDate = new Date(latestAssignEvent.created_at);
                
                // If it's been more than 5 days since assignment
                if ((now - assignDate) > STALE_DURATION) {
                  // Check if a PR is linked (using GraphQL to find CROSS_REFERENCED_EVENT)
                  const query = `
                    query($owner: String!, $repo: String!, $issue_number: Int!) {
                      repository(owner: $owner, name: $repo) {
                        issue(number: $issue_number) {
                          timelineItems(itemTypes: [CROSS_REFERENCED_EVENT], last: 10) {
                            nodes {
                              ... on CrossReferencedEvent {
                                source {
                                  ... on PullRequest {
                                    state
                                    number
                                    url
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  `;
                  
                  const variables = {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number
                  };
                  
                  let hasLinkedPR = false;
                  try {
                    const result = await github.graphql(query, variables);
                    const timelineItems = result.repository.issue.timelineItems.nodes;
                    if (timelineItems && timelineItems.length > 0) {
                      hasLinkedPR = timelineItems.some(item => item.source && item.source.number);
                    }
                  } catch (error) {
                    console.error(`Error fetching GraphQL timeline for issue #${issue.number}:`, error);
                  }
                  
                  // If no PR is linked, unassign
                  if (!hasLinkedPR) {
                    const assignees = issue.assignees.map(a => a.login);
                    
                    console.log(`Unassigning ${assignees.join(', ')} from issue #${issue.number} due to inactivity.`);
                    
                    // Remove all assignees
                    await github.rest.issues.removeAssignees({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      assignees: assignees
                    });
                    
                    // Leave a comment explaining why
                    await github.rest.issues.createComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      body: `This issue has been automatically unassigned because it has been assigned for over 5 days without a linked Pull Request. @${assignees.join(', ')}`
                    });
                  }
                }
              }
            }
