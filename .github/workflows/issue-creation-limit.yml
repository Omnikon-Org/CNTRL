name: Issue Creation Limit
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  check-limit:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce issue limit
        uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.issue.user.login;
            const currentIssueNum = context.payload.issue.number;
            
            // Fetch all open issues by the creator in this repo
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: creator,
              state: 'open'
            });
            
            // Issues API returns both issues and pull requests, so filter out PRs
            const openIssues = issues.filter(issue => !issue.pull_request);
            
            // The newly created issue is already included in this list, so if > 5, close the current one
            if (openIssues.length > 5) {
              console.log(`User ${creator} has ${openIssues.length} open issues. Closing issue #${currentIssueNum}.`);
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: currentIssueNum,
                body: `@${creator} You have reached the maximum limit of 5 open issues at a time. Please close or resolve some of your existing issues before creating new ones. This issue will be closed automatically.`
              });
              
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: currentIssueNum,
                state: 'closed',
                state_reason: 'not_planned'
              });
            } else {
              console.log(`User ${creator} has ${openIssues.length} open issues. This is within the limit.`);
            }
