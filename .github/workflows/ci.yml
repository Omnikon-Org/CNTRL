name: CI

on:
  push:
    branches: [ "main", "phase-1-scaffold" ]
  pull_request:
    branches: [ "main", "phase-1-scaffold" ]

jobs:
  # Job 1: Linting the Frontend
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: ESLint Check
        run: npx eslint . --max-warnings 0

      # [FUTURE EXTENSIBILITY]: You can append frontend testing here later
      # Example:
      # - name: Vitest Check
      #   run: npx vitest run

  # Job 2: Checking the Rust Backend
  rust-check:
    name: Rust Cargo Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install WebKit Dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Run Cargo Check
        run: cargo check --all-targets

      # [FUTURE EXTENSIBILITY]: You can append backend testing or formatting here later
      # Example:
      # - name: Rust Clippy
      #   run: cargo clippy --all-targets --all-features -- -D warnings
      # - name: Rust Tests
      #   run: cargo test --all